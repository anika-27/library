<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Library Project - The Odin Project</title>
        <script src = "script.js" defer></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="container">
        </div>
        <dialog class="NewBookDialog">
                <h2>Add Your Latest Read!</h2>
                <form>
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title">
                    
                    <label for="author">Author:</label>
                    <input type="text" id="author" name="author">

                    <label for="number">Number of Pages:</label>
                    <input type="number" id="pages" name="pages">

                    <button class="CloseButton">Cancel</button>
                    <button class="Submit">Add My Book!</button>
                </form>
            </dialog>
    </body>

</html>
